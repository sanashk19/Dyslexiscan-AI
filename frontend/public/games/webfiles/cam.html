<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Air Canvas - Gesture Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap');
        
        body { 
            margin: 0; background: #1a1a2e; color: white; 
            font-family: 'Lexend', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        
        #ui-layer {
            position: absolute; top: 20px; z-index: 10; text-align: center;
            background: rgba(0,0,0,0.7); padding: 15px 30px; border-radius: 20px;
            border: 2px solid #00d2ff;
        }

        .video-container { position: relative; width: 100vw; height: 100vh; }
        
        #input_video, #output_canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; transform: rotateY(180deg);
        }

        #draw_canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transform: rotateY(180deg); z-index: 5;
        }

        #ai-status {
            position: absolute; top: 120px; font-size: 1.5rem;
            color: #fff9d6; font-weight: bold; z-index: 10;
            text-shadow: 0 0 10px rgba(0,0,0,1);
        }

        .btn-clear {
            position: absolute; bottom: 30px; right: 30px;
            padding: 15px 30px; background: #ff4757; color: white;
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
            z-index: 20;
        }

        #result-popup {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 12rem; color: #00d2ff; font-weight: bold; z-index: 100;
            display: none; text-shadow: 0 0 40px #00d2ff;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>✨ AI Air Canvas ✨</h1>
        <p>☝️ <b>Index:</b> Draw  |  ✋ <b>Palm:</b> AI Check!</p>
    </div>

    <div id="ai-status">Show palm to check your letter!</div>
    <div id="result-popup"></div>

    <div class="video-container">
        <video id="input_video" style="display:none;"></video>
        <canvas id="output_canvas"></canvas>
        <canvas id="draw_canvas"></canvas>
    </div>

    <button class="btn-clear" onclick="clearCanvas()">🗑️ Clear</button>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const drawCanvas = document.getElementById('draw_canvas');
        const drawCtx = drawCanvas.getContext('2d');
        const statusText = document.getElementById('ai-status');
        const resultPopup = document.getElementById('result-popup');

        function resize() {
            drawCanvas.width = window.innerWidth;
            drawCanvas.height = window.innerHeight;
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let lastX = 0, lastY = 0, isDrawing = false, isProcessing = false;

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && !isProcessing) {
                for (const landmarks of results.multiHandLandmarks) {
                    const indexTip = landmarks[8];
                    const middleTip = landmarks[12];
                    const ringTip = landmarks[16];
                    const pinkyTip = landmarks[20];
                    const wrist = landmarks[0];

                    const x = indexTip.x * drawCanvas.width;
                    const y = indexTip.y * drawCanvas.height;

                    // 1. PALM DETECTION (✋ STOP/CHECK)
                    // If index, middle, ring, and pinky are ALL above their knuckles
                    const isPalm = (indexTip.y < landmarks[5].y && 
                                    middleTip.y < landmarks[9].y && 
                                    ringTip.y < landmarks[13].y && 
                                    pinkyTip.y < landmarks[17].y);

                    if (isPalm) {
                        if (isDrawing) {
                            isDrawing = false;
                            statusText.innerText = "🤖 AI Thinking...";
                            recognizeLetter();
                        }
                    } 
                    // 2. DRAWING MODE (☝️ INDEX ONLY)
                    else if (indexTip.y < landmarks[6].y && middleTip.y > landmarks[9].y) {
                        statusText.innerText = "✍️ Drawing...";
                        if (!isDrawing) {
                            isDrawing = true;
                            lastX = x; lastY = y;
                        }
                        drawCtx.beginPath();
                        drawCtx.moveTo(lastX, lastY);
                        drawCtx.lineTo(x, y);
                        drawCtx.strokeStyle = '#00d2ff';
                        drawCtx.lineWidth = 15;
                        drawCtx.lineCap = 'round';
                        drawCtx.stroke();
                        lastX = x; lastY = y;
                    } else {
                        isDrawing = false;
                    }
                }
            }
            canvasCtx.restore();
        }

        async function recognizeLetter() {
            isProcessing = true;
            statusText.innerText = "🔍 Identifying...";
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = drawCanvas.width;
            tempCanvas.height = drawCanvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.translate(tempCanvas.width, 0);
            tempCtx.scale(-1, 1);
            tempCtx.drawImage(drawCanvas, 0, 0);

            try {
                const result = await Tesseract.recognize(tempCanvas, 'eng', {
                    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'
                });
                
                const letter = result.data.text.trim().charAt(0).toUpperCase();
                
                if (letter && letter.match(/[A-Z]/)) {
                    showResult(letter);
                } else {
                    statusText.innerText = "❓ Not sure! Show palm again to retry.";
                    speak("I didn't quite catch that. Try drawing a bit clearer!");
                    isProcessing = false;
                }
            } catch (e) {
                isProcessing = false;
            }
        }

        function showResult(char) {
            resultPopup.innerText = char;
            resultPopup.style.display = 'block';
            statusText.innerText = `✅ That's a letter ${char}!`;
            speak(`Awesome! You drew the letter ${char}!`);
            
            setTimeout(() => {
                resultPopup.style.display = 'none';
                clearCanvas();
                statusText.innerText = "Show palm to check your letter!";
                isProcessing = false;
            }, 3000);
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();

        function clearCanvas() {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            let m = new SpeechSynthesisUtterance(t); m.rate = 0.85; window.speechSynthesis.speak(m);
        }
    </script>
</body>
</html>
